        <script>
        (function(){
            // click-to-insert-image for bulletin boxes
            const container = document.querySelector('.bulletinContainer');
            if(!container) return;
            // prepare file input
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);

            // attach click handlers to each box
        container.querySelectorAll('.row1, .row2, .row3').forEach(box=>{
                // set a data-placeholder attribute so CSS can show placeholder text
                if(!box.hasAttribute('data-placeholder')) box.setAttribute('data-placeholder', box.textContent.trim() || 'Click to add image');
                // clear visible text (placeholder handled by CSS ::before)
                box.textContent = '';

                        box.addEventListener('click', (e)=>{
                    e.stopPropagation();
                    // store the clicked box for use after file selection
                    container._activeBox = box;
                    fileInput.click();
                });
            });

            fileInput.addEventListener('change', function(){
                const f = this.files && this.files[0];
                if(!f) return;
                const reader = new FileReader();
                reader.onload = function(){
                    const url = reader.result;
                    const box = container._activeBox;
                    if(!box) return;
                    // remove existing image or placeholder
                      box.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = f.name || 'Inserted image';
                      // mark the box so placeholder hides
                      box.classList.add('has-image');
                    box.appendChild(img);
                };
                reader.readAsDataURL(f);
                // clear input so same file can be selected again
                this.value = '';
            });
        })();
        </script>
